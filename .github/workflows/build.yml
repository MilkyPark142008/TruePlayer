name: Build TruePlayer

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'ci-logs/**'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14

      - name: Build with Gradle
        shell: bash
        run: |
          gradle build --stacktrace --info -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" 2>&1 | tee build-output.log
          exit ${PIPESTATUS[0]}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-log
          path: build-output.log
          if-no-files-found: ignore

      - name: Commit build log on failure
        if: failure()
        shell: bash
        run: |
          mkdir -p ci-logs
          cp build-output.log ci-logs/latest-build-output.log || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-logs/latest-build-output.log
          git commit -m "Update CI build log [skip ci]" || exit 0
          git push

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: TruePlayer
          path: build/libs/*.jar
